<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Sea Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; cursor: none; }
    #ui { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 800px; pointer-events: none; }

    /* ── HUD ── */
    #hud { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 10px 32px; background: linear-gradient(180deg, rgba(0,5,20,0.88) 0%, rgba(0,5,20,0.50) 70%, transparent 100%); position: relative; }
    .stat-box { background: rgba(0,8,32,0.96); border: 1px solid rgba(0,180,255,0.65); border-radius: 8px; padding: 10px 14px; color: #0af; font-family: monospace; font-size: 15px; min-width: 160px; box-shadow: 0 0 18px rgba(0,120,255,0.2), inset 0 0 20px rgba(0,30,90,0.4); }
    .stat-box .label { color: #7ad; font-size: 12px; letter-spacing: 0.06em; margin-bottom: 3px; text-transform: uppercase; }
    .bar { height: 11px; border-radius: 5px; background: #0a1030; margin-top: 5px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; transition: width 0.2s; }
    #health-fill { background: linear-gradient(90deg, #f44, #f84); }
    #health-val { font-size: 17px; font-weight: bold; }
    #depth-val  { font-size: 22px; font-weight: bold; letter-spacing: 0.04em; }
    #fuel-val   { font-size: 14px; }
    #gold-val   { font-size: 18px; font-weight: bold; color: #fd0; }

    /* Cargo bar */
    .cargo-bar-track { height: 10px; background: #0a1030; border-radius: 5px; margin: 4px 0 5px; overflow: hidden; }
    .cargo-bar-fill  { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #0f8, #4fc); transition: width 0.2s; }
    #cargo-val { font-size: 15px; font-weight: bold; color: #0f8; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Pause button ── */
    #pause-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,8,32,0.96); border: 1px solid rgba(0,180,255,0.65); border-radius: 6px; color: #0af; font-family: monospace; font-size: 13px; font-weight: bold; padding: 6px 12px; cursor: pointer; pointer-events: all; transition: background 0.15s; letter-spacing: 0.05em; }
    #pause-btn:hover { background: rgba(0,40,100,0.96); border-color: #4cf; }

    /* ── Pause overlay ── */
    #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.60); font-family: monospace; pointer-events: none; }
    #pause-overlay h2 { font-size: 52px; color: #0af; text-shadow: 0 0 30px #0af, 0 0 60px #06f; letter-spacing: 0.12em; }
    #pause-overlay p  { font-size: 16px; color: #68c; margin-top: 14px; }

    /* ── Overlay (title / death screens) ── */
    #screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.87); color: #fff; font-family: monospace; }
    #screen-overlay h1 { font-size: 48px; color: #0af; text-shadow: 0 0 20px #0af; margin-bottom: 20px; }
    #screen-overlay p { font-size: 18px; color: #8cf; margin: 6px 0; }
    .overlay-buttons { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 28px; }
    .overlay-buttons button { padding: 12px 44px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-family: monospace; font-weight: bold; pointer-events: all; }
    #overlay-btn  { background: #0af; color: #000; }
    #overlay-btn:hover  { background: #4cf; }
    #overlay-btn2 { background: #0a0a0a; color: #0f8; border: 1px solid #0f8 !important; font-size: 15px; padding: 10px 36px; }
    #overlay-btn2:hover { background: #051505; }

    /* ── Upgrade screen ── */
    #upgrade-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,5,20,0.96); font-family: monospace; color: #0af; overflow-y: auto; padding: 20px 0; }
    #upgrade-screen h2 { font-size: 34px; text-shadow: 0 0 15px #0af; margin-bottom: 6px; }
    #upgrade-screen .gold { color: #fd0; font-size: 20px; margin-bottom: 12px; }

    /* Canister shop strip */
    #canister-shop { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; background: rgba(255,130,0,0.08); border: 1px solid rgba(255,130,0,0.3); border-radius: 8px; padding: 8px 18px; }
    #canister-shop span { color: #f80; font-size: 13px; }
    #buy-canister-btn { background: #f80; color: #000; border: none; border-radius: 6px; padding: 7px 18px; font-family: monospace; font-size: 12px; font-weight: bold; cursor: pointer; pointer-events: all; }
    #buy-canister-btn:hover:not(:disabled) { background: #fda; }
    #buy-canister-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Garage */
    #garage-section { display: flex; gap: 12px; margin-bottom: 14px; width: 690px; }
    .sub-card { flex: 1; background: rgba(0,15,45,0.8); border: 1px solid #0af44; border-radius: 8px; padding: 10px 8px; text-align: center; font-family: monospace; }
    .sub-card.sub-active { border-color: #0f8; background: rgba(0,30,20,0.8); }
    .sub-card.sub-locked { opacity: 0.55; }
    .sub-icon { width: 40px; height: 20px; border-radius: 50%; margin: 0 auto 6px; }
    .sub-name { font-size: 13px; font-weight: bold; margin-bottom: 3px; }
    .sub-desc { font-size: 10px; color: #468; margin-bottom: 5px; }
    .sub-stats { font-size: 10px; color: #6a9; display: flex; justify-content: space-around; margin-bottom: 6px; }
    .sub-btn { font-size: 10px; padding: 4px 8px; border-radius: 4px; border: 1px solid #0af; color: #0af; cursor: default; pointer-events: none; }
    .sub-btn-select, .sub-btn-buy { cursor: pointer; pointer-events: all; }
    .sub-btn-select:hover { background: #0af3; }
    .sub-btn-buy { border-color: #fd0; color: #fd0; font-size: 9px; }
    .sub-btn-buy:hover { background: #fd01; }

    /* Upgrade grid */
    .upgrades-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; width: 690px; }
    .upgrade-card { background: rgba(0,20,60,0.8); border: 1px solid #0af; border-radius: 8px; padding: 12px 10px; text-align: center; cursor: pointer; pointer-events: all; transition: all 0.18s; }
    .upgrade-card:hover:not(.maxed):not(.cant-afford) { background: rgba(0,55,120,0.85); border-color: #4cf; transform: translateY(-1px); }
    .upgrade-card.maxed  { border-color: #0f8; background: rgba(0,30,20,0.8); }
    .upgrade-card.cant-afford { opacity: 0.38; cursor: not-allowed; }
    .upgrade-card h3 { font-size: 13px; color: #8cf; margin-bottom: 5px; }
    .upgrade-dots { font-size: 15px; letter-spacing: 2px; margin: 4px 0 3px; }
    .upgrade-card .level-text { font-size: 10px; color: #468; margin-bottom: 5px; }
    .upgrade-bar-track { height: 5px; background: #0a1a30; border-radius: 3px; margin: 2px 6px 5px; overflow: hidden; }
    .upgrade-bar-fill  { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#0af,#0f8); transition: width 0.3s; }
    .upgrade-card.maxed .upgrade-bar-fill { background: linear-gradient(90deg,#0f8,#4fc); }
    .upgrade-card .cost   { font-size: 12px; color: #fd0; margin-bottom: 2px; }
    .upgrade-card .effect { font-size: 10px; color: #6a9; }

    /* Bottom action buttons */
    .upgrade-actions { display: flex; gap: 14px; margin-top: 4px; }
    #dive-btn { padding: 11px 46px; font-size: 17px; background: #0af; color: #000; border: none; border-radius: 8px; cursor: pointer; font-family: monospace; font-weight: bold; pointer-events: all; }
    #dive-btn:hover { background: #4cf; }
    #save-btn { padding: 11px 28px; font-size: 15px; background: #0a2a0a; color: #0f8; border: 1px solid #0f8; border-radius: 8px; cursor: pointer; font-family: monospace; font-weight: bold; pointer-events: all; }
    #save-btn:hover { background: #0d3a0d; }

    #message { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,20,60,0.9); border: 1px solid #0af; border-radius: 6px; padding: 8px 20px; color: #0af; font-family: monospace; font-size: 14px; opacity: 0; transition: opacity 0.5s; pointer-events: none; white-space: nowrap; }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="ui">
  <div id="hud">
    <!-- Left: Hull -->
    <div class="stat-box">
      <div class="label">Hull Integrity</div>
      <div id="health-val">100 / 100</div>
      <div class="bar"><div class="bar-fill" id="health-fill" style="width:100%"></div></div>
    </div>

    <!-- Center: Depth + Fuel -->
    <div class="stat-box" style="text-align:center">
      <div class="label">Depth</div>
      <div id="depth-val">0m</div>
      <div style="margin-top:2px;font-size:12px;color:#7ad" id="zone-label">SURFACE</div>
      <div class="label" style="margin-top:8px">Fuel</div>
      <div id="fuel-val">300 / 300</div>
      <div class="bar"><div class="bar-fill" id="fuel-fill" style="width:100%;background:linear-gradient(90deg,#f80,#fd0)"></div></div>
      <div id="fuel-warning" style="display:none;color:#f84;font-size:12px;font-weight:bold;margin-top:4px;animation:blink 0.6s step-end infinite">⚠ LOW FUEL</div>
    </div>

    <!-- Right: Treasure + Cargo -->
    <div class="stat-box">
      <div class="label">Coins</div>
      <div id="gold-val">0</div>
      <div class="label" style="margin-top:8px">Cargo Hold</div>
      <div id="cargo-val">0 / 10</div>
      <div class="cargo-bar-track"><div class="cargo-bar-fill" id="cargo-fill" style="width:0%"></div></div>
      <div id="cargo-items" style="margin-top:4px;min-height:14px;line-height:1.4;display:flex;flex-wrap:wrap;gap:3px;"></div>
      <div id="canister-val" style="font-size:12px;color:#f80;margin-top:6px">⛽ 0 [F] &nbsp; 🔵 0 [T]</div>
    </div>

    <!-- Pause button -->
    <button id="pause-btn">⏸ PAUSE</button>
  </div>
</div>

<!-- Pause overlay -->
<div id="pause-overlay">
  <h2>PAUSED</h2>
  <p>Press P or click PAUSE to resume</p>
</div>

<div id="screen-overlay">
  <h1 id="overlay-title">DEEP SEA EXPLORER</h1>
  <div id="overlay-body"></div>
  <div class="overlay-buttons">
    <button id="overlay-btn">NEW GAME</button>
    <button id="overlay-btn2" style="display:none">CONTINUE</button>
  </div>
</div>

<div id="upgrade-screen">
  <h2>SURFACE BASE</h2>
  <div class="gold" id="upgrade-gold">0 coins</div>

  <div id="garage-section"></div>

  <div id="canister-shop">
    <span id="canister-count-shop">0/10 canisters · 0/5 teleporters</span>
    <button id="buy-canister-btn">CANISTER — 25 coins</button>
    <button id="buy-teleporter-btn" style="background:#0af;color:#000;border:none;border-radius:6px;padding:7px 14px;font-family:monospace;font-size:12px;font-weight:bold;cursor:pointer;pointer-events:all;">TELEPORTER — 200 coins</button>
  </div>

  <div class="upgrades-grid" id="upgrades-grid"></div>

  <div class="upgrade-actions">
    <button id="save-btn">💾 SAVE GAME</button>
    <button id="dive-btn">DIVE AGAIN</button>
  </div>
</div>

<div id="message"></div>

<script src="game.js"></script>
</body>
</html>
